<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finger Demo</title>
    <link rel="stylesheet" href="style.css?v=29071201">
</head>

<body>

    <div class="game">

        <!-- 背景 -->
        <img src="images/page1_bg.png" class="bg">

        <!-- Page1六个盲盒的售出覆盖图，默认隐藏 -->
        <img src="images/page1_sold_01.png" class="page1-sold" id="page1Sold01" style="display: none;">

        <img src="images/page1_sold_02.png" class="page1-sold" id="page1Sold02" style="display: none;">

        <img src="images/page1_sold_03.png" class="page1-sold" id="page1Sold03" style="display: none;">

        <img src="images/page1_sold_04.png" class="page1-sold" id="page1Sold04" style="display: none;">

        <img src="images/page1_sold_05.png" class="page1-sold" id="page1Sold05" style="display: none;">

        <img src="images/page1_sold_06.png" class="page1-sold" id="page1Sold06" style="display: none;">

        <!-- Page1右下角人物前景图层 -->
        <img src="images/page1_foreground.png" class="page1-foreground" id="page1Foreground">

        <!--Page1点击区域层-->
        <div class="click-layer">

            <div class="click-box" data-id="1"></div>
            <div class="click-box" data-id="2"></div>
            <div class="click-box" data-id="3"></div>
            <div class="click-box" data-id="4"></div>
            <div class="click-box" data-id="5"></div>
            <div class="click-box" data-id="6"></div>

        </div>

        <!-- 手指指引-->
        <img src="images/finger.png" class="finger">

        <!-- PAGE 2：详情页，默认隐藏 -->
        <img src="images/page2_bg.png" class="page2-bg" id="page2">

        <!-- Page2 缩略图状态 -->
        <img src="images/thumbnail_1.png" class="thumbnail" id="thumbnail">

        <!-- Page2缩略图六个售出覆盖图，默认隐藏 -->
        <img src="images/page2_thumb_sold_01.png" class="page2-thumb-sold" id="page2ThumbSold01" style="display: none;">

        <img src="images/page2_thumb_sold_02.png" class="page2-thumb-sold" id="page2ThumbSold02" style="display: none;">

        <img src="images/page2_thumb_sold_03.png" class="page2-thumb-sold" id="page2ThumbSold03" style="display: none;">

        <img src="images/page2_thumb_sold_04.png" class="page2-thumb-sold" id="page2ThumbSold04" style="display: none;">

        <img src="images/page2_thumb_sold_05.png" class="page2-thumb-sold" id="page2ThumbSold05" style="display: none;">

        <img src="images/page2_thumb_sold_06.png" class="page2-thumb-sold" id="page2ThumbSold06" style="display: none;">

        <!-- Page2 盲盒晃动容器 -->
        <div class="box-motion" id="boxMotion">

            <!-- Page2 快速甩动容器 -->
            <div class="box-shake" id="boxShake">

                <!-- Page2 盲盒主体 -->
                <img src="images/box.png" class="box" id="box">

                <!-- Page2 下一个盲盒 -->
                <img src="images/box.png" class="box" id="boxNext">

            </div>

        </div>

        <!-- Page2 左右按钮 -->
        <img src="images/arrow_left.png" class="arrow-btn arrow-left" id="arrowLeft">

        <img src="images/arrow_right.png" class="arrow-btn arrow-right" id="arrowRight">

        <!-- Page2 购入按钮 -->
        <img src="images/buy.png" class="buy-btn" id="buyButton">

        <!-- Page2 购入热区 -->
        <div class="buy-hit" id="buyHit"></div>

        <!-- Page3 -->
        <img src="images/page3_bg.png" class="page3-bg" id="page3">

        <!-- Page3放大盲盒 -->
        <img src="images/page3_box_00.png" class="page3-box" id="page3Box">

        <!-- Page3粉色箭头 -->
        <img src="images/page3_arrow.png" class="page3-arrow" id="page3Arrow">

        <!-- Page3手部图标 -->
        <img src="images/page3_hand.png" class="page3-hand" id="page3Hand">

        <!-- Page4静态背景，默认隐藏 -->
        <img src="images/page4_bg.png" class="page4-bg" id="page4" style="display: none;">

        <!-- Page4娃娃图层，默认显示第1款并保持隐藏 -->
        <img src="images/page4_doll_01.png" class="page4-doll" id="page4Doll" style="display: none;">

        <!-- Page4彩带序列帧图层，默认隐藏 -->
        <img src="images/page4_confetti_00.png" class="page4-confetti" id="page4Confetti" style="display: none;">

        <!-- Page5娃娃详情页，默认显示第1款并保持隐藏 -->
        <img src="images/page5_01.png" class="page5-bg" id="page5" style="display: none;">

        <!-- Page5继续购买按钮图片 -->
        <img src="images/page5_continue.png" class="page5-button page5-continue-button" id="page5ContinueButton"
            style="display: none;">

        <!-- Page5结束购买按钮图片 -->
        <img src="images/page5_finish.png" class="page5-button page5-finish-button" id="page5FinishButton"
            style="display: none;">

        <!-- Page5继续购买透明热区 -->
        <div class="page5-continue-hit" id="page5ContinueHit" style="display: none;"></div>

        <!-- Page5结束购买透明热区 -->
        <div class="page5-finish-hit" id="page5FinishHit" style="display: none;"></div>

        <!-- Page6静态背景，默认隐藏 -->
        <img src="images/page6_bg.png" class="page6-bg" id="page6" style="display: none;">

        <!-- Page6小人序列帧，默认显示第00帧并保持隐藏 -->
        <img src="images/page6_character_00.png" class="page6-character" id="page6Character" style="display: none;">

        <!-- Page2 返回点击区域 -->
        <div class="page2-back-hit" id="page2Back"></div>

        <!-- 左按钮热区 -->
        <div class="page2-left-hit" id="page2Left"></div>

        <!-- 右按钮热区 -->
        <div class="page2-right-hit" id="page2Right"></div>


    </div>

    <script src="script.js?v=29071201"></script>

</body>

</html>
