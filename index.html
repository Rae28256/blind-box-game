<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finger Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game">

        <!-- 背景 -->
        <img src="images/page1_bg.png" class="bg">

        <!-- 🔥 点击区域层（新增的就在这里） -->
        <div class="click-layer">

            <div class="click-box" data-id="1"></div>
            <div class="click-box" data-id="2"></div>
            <div class="click-box" data-id="3"></div>
            <div class="click-box" data-id="4"></div>
            <div class="click-box" data-id="5"></div>
            <div class="click-box" data-id="6"></div>

        </div>

        <!-- 手指指引-->
        <img src="images/finger.png" class="finger">

        <!-- PAGE 2：详情页，默认隐藏 -->
        <img src="images/page2_bg.png" class="page2-bg" id="page2">

        <!-- Page2 返回点击区域 -->
        <div class="page2-back-hit" id="page2Back"></div>


    </div>

    <script src="script.js"></script>

</body>

</html>
