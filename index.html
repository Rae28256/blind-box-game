<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finger Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game">

        <!-- 背景 -->
        <img src="images/page1_bg.png" class="bg">

        <!-- 🔥 点击区域层（新增的就在这里） -->
        <div class="click-layer">

            <div class="click-box" data-id="1"></div>
            <div class="click-box" data-id="2"></div>
            <div class="click-box" data-id="3"></div>
            <div class="click-box" data-id="4"></div>
            <div class="click-box" data-id="5"></div>
            <div class="click-box" data-id="6"></div>

        </div>

        <!-- 手指指引-->
        <img src="images/finger.png" class="finger">

        <!-- PAGE 2：详情页，默认隐藏 -->
        <img src="images/page2_bg.png" class="page2-bg" id="page2">

        <!-- Page2 缩略图状态 -->
        <img src="images/thumbnail_1.png" class="thumbnail" id="thumbnail">


        <!-- Page2 盲盒晃动容器 -->
        <div class="box-motion" id="boxMotion">

            <!-- Page2 快速甩动容器 -->
            <div class="box-shake" id="boxShake">

                <!-- Page2 盲盒主体 -->
                <img src="images/box.png" class="box" id="box">

                <!-- Page2 下一个盲盒 -->
                <img src="images/box.png" class="box" id="boxNext">

            </div>

        </div>

        <!-- Page2 左右按钮 -->
        <img src="images/arrow_left.png" class="arrow-btn arrow-left" id="arrowLeft">

        <img src="images/arrow_right.png" class="arrow-btn arrow-right" id="arrowRight">

        <!-- Page2 购入按钮 -->
        <img src="images/buy.png" class="buy-btn" id="buyButton">

        <!-- Page2 购入热区 -->
        <div class="buy-hit" id="buyHit"></div>

        <!-- Page3 -->
        <img src="images/page3_bg.png" class="page3-bg" id="page3">

        <!-- Page3放大盲盒 -->
        <img src="images/page3_box.png" class="page3-box" id="page3Box">

        <!-- Page3粉色箭头 -->
        <img src="images/page3_arrow.png" class="page3-arrow" id="page3Arrow">

        <!-- Page3手部图标 -->
        <img src="images/page3_hand.png" class="page3-hand" id="page3Hand">

        <!-- Page2 返回点击区域 -->
        <div class="page2-back-hit" id="page2Back"></div>

        <!-- 左按钮热区 -->
        <div class="page2-left-hit" id="page2Left"></div>

        <!-- 右按钮热区 -->
        <div class="page2-right-hit" id="page2Right"></div>


    </div>

    <script src="script.js"></script>

</body>

</html>
